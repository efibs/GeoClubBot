name: Release

# A release is cut by pushing a SemVer tag (no "v" prefix, matching the existing
# scheme, e.g. 0.13.0 or 0.13.0-rc.1). The tagged commit is fully tested, then the
# container image is built and published to GHCR and a GitHub Release is created.
#
#   git tag 0.13.0 && git push origin 0.13.0
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-**'

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/geo-club-bot

jobs:
  # Gate the release on the same suite PRs must pass — never publish untested code.
  tests:
    uses: ./.github/workflows/tests.yml

  publish:
    name: Build & publish image
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      packages: write   # push the image to GHCR
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          # From tag 0.13.0 -> :0.13.0, :0.13, :0, and :latest (latest only on a
          # stable, non-prerelease tag). A 0.13.0-rc.1 tag publishes only :0.13.0-rc.1.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./GeoClubBot.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flags=()
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            flags+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag \
            "${flags[@]}"
