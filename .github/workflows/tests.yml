name: Tests

# Reusable workflow: build the solution and run the full test suite.
# Called by ci.yml (PR gate), dev-image.yml and release.yml so "run all tests"
# is defined in exactly one place.
on:
  workflow_call:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  # Fast feedback: build + every test that doesn't need Docker.
  unit-tests:
    name: Unit tests (fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore GeoClubBot.sln

      - name: Build
        run: dotnet build GeoClubBot.sln --no-restore --configuration Release

      - name: Test (excluding integration)
        run: >
          dotnet test GeoClubBot.Tests/GeoClubBot.Tests.csproj
          --no-build --configuration Release
          --filter "Category!=Integration"
          --settings coverlet.runsettings
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults/unit
          --logger "trx;LogFileName=unit.trx"

      - name: Coverage report
        if: always()
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # 5.5.10
        with:
          reports: ./TestResults/unit/**/coverage.cobertura.xml
          targetdir: ./TestResults/unit/coveragereport
          reporttypes: MarkdownSummaryGithub;Cobertura

      - name: Publish coverage to job summary
        if: always()
        run: cat ./TestResults/unit/coveragereport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unit-test-results
          path: ./TestResults/unit
          retention-days: 7

  # Full integration suite. GitHub-hosted ubuntu runners ship a working Docker
  # daemon, so the Testcontainers Postgres fixture spins up out of the box.
  integration-tests:
    name: Integration tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore GeoClubBot.sln

      - name: Build
        run: dotnet build GeoClubBot.sln --no-restore --configuration Release

      - name: Test (integration only)
        run: >
          dotnet test GeoClubBot.Tests/GeoClubBot.Tests.csproj
          --no-build --configuration Release
          --filter "Category=Integration"
          --settings coverlet.runsettings
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults/integration
          --logger "trx;LogFileName=integration.trx"

      - name: Coverage report
        if: always()
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # 5.5.10
        with:
          reports: ./TestResults/integration/**/coverage.cobertura.xml
          targetdir: ./TestResults/integration/coveragereport
          reporttypes: MarkdownSummaryGithub;Cobertura

      - name: Publish coverage to job summary
        if: always()
        run: cat ./TestResults/integration/coveragereport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: integration-test-results
          path: ./TestResults/integration
          retention-days: 7

  # Frontend suite for the Club Dashboard Activity: type-check, Vitest unit/component tests,
  # and Playwright E2E (the config bypasses the Discord SDK and mocks the API per-test).
  frontend-tests:
    name: Frontend tests (Vitest + Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GeoClubBot.Activity
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: GeoClubBot.Activity/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Unit + component tests
        run: npm run test:unit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: GeoClubBot.Activity/playwright-report
          retention-days: 7
          if-no-files-found: ignore
