name: Dev image

# When a reviewed feature lands on dev, run the full suite and publish a rolling
# staging image: ghcr.io/<owner>/geo-club-bot:dev (plus :dev-<sha> for traceability).
on:
  push:
    branches: [ dev ]
  workflow_dispatch:

concurrency:
  group: dev-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/geo-club-bot

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  publish-dev:
    name: Build & publish :dev image
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev
            type=sha,prefix=dev-,format=short

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./GeoClubBot.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
