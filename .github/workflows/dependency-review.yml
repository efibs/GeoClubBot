name: Dependency review

# Blocks a pull request that introduces a dependency with a known high-severity
# vulnerability (or a disallowed licence). Complements Dependabot: Dependabot opens
# update PRs on a schedule, this gates new dependencies as they are added.
on:
  pull_request:
    branches: [ dev, master ]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Review dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
