<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GeoClubBot - Mock GeoGuessr API</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
body{font-family:system-ui,sans-serif;background:#f8f9fa}
#nav{width:240px;min-height:100vh;position:fixed;overflow-y:auto;background:#212529;color:#fff;padding:1rem}
#nav h5{margin-bottom:.5rem}
#nav a{color:#ccc;text-decoration:none;display:block;padding:4px 8px;border-radius:4px;font-size:.9rem}
#nav a:hover,#nav a.active{color:#fff;background:#343a40}
#nav hr{border-color:#444}
#main{margin-left:256px;padding:1.5rem}
.card{box-shadow:0 1px 3px rgba(0,0,0,.1);margin-bottom:1rem}
.card-header{font-weight:600;font-size:.95rem}
code{font-size:.82em}
.btn-group-sm>.btn{font-size:.8em}
table th{font-size:.9em;white-space:nowrap}
.stat-card .card-body{padding:.75rem}
.stat-card h5{margin:0;font-size:1.5rem}
.stat-card p{margin:0;font-size:.85rem}
</style>
</head>
<body>
<div id="nav">
  <h5>Mock GeoGuessr</h5><hr/>
  <a href="#" onclick="showView('dashboard')">Dashboard</a>
  <a href="#" onclick="showView('users')">Users</a>
  <a href="#" onclick="showView('challenges')">Challenges</a>
  <a href="#" onclick="showView('jobs')">Jobs</a>
  <hr/><div id="nav-clubs"><small class="text-secondary">Clubs</small></div>
</div>
<div id="main">
  <div id="v-dashboard"></div>
  <div id="v-club" style="display:none"></div>
  <div id="v-users" style="display:none"></div>
  <div id="v-challenges" style="display:none"></div>
  <div id="v-jobs" style="display:none"></div>
</div>
<script>
const API='/mock/api';
let currentView='dashboard', currentClubId=null;

async function api(path,opts){
  const r=await fetch(API+path,{headers:{'Content-Type':'application/json'},...opts});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();
  return t?JSON.parse(t):null;
}
function post(p,b){return api(p,{method:'POST',body:JSON.stringify(b)})}
function del(p){return api(p,{method:'DELETE'})}

function showView(v,clubId){
  currentView=v;
  document.querySelectorAll('#main>div').forEach(d=>d.style.display='none');
  if(v==='club'){currentClubId=clubId;document.getElementById('v-club').style.display='';loadClub(clubId)}
  else{document.getElementById('v-'+v).style.display='';window['load_'+v]()}
  document.querySelectorAll('#nav a').forEach(a=>a.classList.remove('active'));
}

function h(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ── Dashboard ──
async function load_dashboard(){
  const d=await api('/state');
  let html=`<h3>Dashboard</h3><p class="text-muted">All data in memory, initialized from DB.</p>
  <div class="row mb-4">
    <div class="col-md-4"><div class="card stat-card"><div class="card-body"><h5>${d.clubs.length}</h5><p class="text-muted">Clubs</p></div></div></div>
    <div class="col-md-4"><div class="card stat-card"><div class="card-body"><h5>${d.users.length}</h5><p class="text-muted">Users</p></div></div></div>
    <div class="col-md-4"><div class="card stat-card"><div class="card-body"><h5>${d.challengeCount}</h5><p class="text-muted">Challenges</p></div></div></div>
  </div><h4>Clubs</h4><table class="table table-striped table-hover"><thead><tr><th>Name</th><th>ID</th><th>Level</th><th>XP</th><th>Members</th><th></th></tr></thead><tbody>`;
  d.clubs.forEach(c=>{
    html+=`<tr><td>${h(c.name)}</td><td><code>${c.clubId.substring(0,8)}...</code></td><td>${c.level}</td><td>${c.xp}</td><td>${c.memberCount}/${c.maxMemberCount}</td>
    <td><button class="btn btn-sm btn-primary" onclick="showView('club','${c.clubId}')">Manage</button></td></tr>`;
  });
  html+=`</tbody></table>`;
  document.getElementById('v-dashboard').innerHTML=html;
  renderNavClubs(d.clubs);
}

function renderNavClubs(clubs){
  let html='<small class="text-secondary">Clubs</small>';
  clubs.forEach(c=>{html+=`<a href="#" onclick="showView('club','${c.clubId}')">${h(c.name)}</a>`});
  document.getElementById('nav-clubs').innerHTML=html;
}

// ── Club Detail ──
async function loadClub(id){
  const d=await api('/clubs/'+id);
  const allUsers=await api('/users');
  const memberIds=new Set(d.members.map(m=>m.userId));
  const available=allUsers.filter(u=>!memberIds.has(u.id));
  const clubs=(await api('/state')).clubs.filter(c=>c.clubId!==id);
  const c=d.club;

  let html=`<h3>${h(c.name)}</h3><p class="text-muted">Club ID: <code>${c.clubId}</code></p>`;

  // Club props
  html+=`<div class="card"><div class="card-header">Club Properties
    <button class="btn btn-sm btn-outline-secondary float-end" onclick="toggleClubEdit()">Edit</button></div>
    <div class="card-body">
      <div id="club-view"><div class="row">
        <div class="col-md-2"><strong>Level:</strong> ${c.level}</div><div class="col-md-2"><strong>XP:</strong> ${c.xp}</div>
        <div class="col-md-2"><strong>Tag:</strong> ${h(c.tag)}</div><div class="col-md-2"><strong>Members:</strong> ${d.members.length}/${c.maxMemberCount}</div>
        <div class="col-md-4"><strong>Desc:</strong> ${h(c.description||'')}</div></div>
        <button class="btn btn-success btn-sm mt-2" onclick="incrLevel('${c.clubId}')">Increment Level</button>
      </div>
      <div id="club-edit" style="display:none"><div class="row g-2">
        <div class="col-md-3"><label class="form-label">Name</label><input class="form-control form-control-sm" id="ce-name" value="${h(c.name)}"/></div>
        <div class="col-md-2"><label class="form-label">Level</label><input class="form-control form-control-sm" id="ce-level" type="number" value="${c.level}"/></div>
        <div class="col-md-2"><label class="form-label">XP</label><input class="form-control form-control-sm" id="ce-xp" type="number" value="${c.xp}"/></div>
        <div class="col-md-2"><label class="form-label">Max Members</label><input class="form-control form-control-sm" id="ce-max" type="number" value="${c.maxMemberCount}"/></div>
        <div class="col-md-2"><label class="form-label">Tag</label><input class="form-control form-control-sm" id="ce-tag" value="${h(c.tag)}"/></div>
        <div class="col-md-4"><label class="form-label">Description</label><input class="form-control form-control-sm" id="ce-desc" value="${h(c.description||'')}"/></div>
      </div><button class="btn btn-primary btn-sm mt-2" onclick="saveClub('${c.clubId}')">Save</button></div>
    </div></div>`;

  // Members
  html+=`<div class="card"><div class="card-header">Members (${d.members.length})</div><div class="card-body">
    <table class="table table-sm"><thead><tr><th>Nick</th><th>User ID</th><th>XP</th><th>Weekly XP</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead><tbody>`;
  d.members.forEach(m=>{
    let moveHtml=clubs.map(tc=>`<li><a class="dropdown-item" href="#" onclick="moveMember('${c.clubId}','${m.userId}','${tc.clubId}')">${h(tc.name)}</a></li>`).join('');
    html+=`<tr><td>${h(m.nick)}</td><td><code>${m.userId.substring(0,8)}...</code></td><td>${m.xp}</td><td>${m.weeklyXp}</td><td>${m.role}</td><td>${m.joinedAt}</td>
    <td><div class="btn-group btn-group-sm">
      <button class="btn btn-outline-success" onclick="addXp('${c.clubId}','${m.userId}')">+20 XP</button>
      <div class="btn-group btn-group-sm"><button class="btn btn-outline-warning dropdown-toggle" data-bs-toggle="dropdown">Move</button><ul class="dropdown-menu">${moveHtml}</ul></div>
      <button class="btn btn-outline-danger" onclick="removeMember('${c.clubId}','${m.userId}')">Remove</button>
    </div></td></tr>`;
  });
  html+=`</tbody></table></div></div>`;

  // Add member
  let optHtml=available.map(u=>`<option value="${u.id}">${h(u.nick)} (${u.id.substring(0,8)}...)</option>`).join('');
  html+=`<div class="card"><div class="card-header">Add Member</div><div class="card-body"><div class="row g-2 align-items-end">
    <div class="col-md-4"><select class="form-select form-select-sm" id="add-member-sel"><option value="">-- Select user --</option>${optHtml}</select></div>
    <div class="col-md-2"><button class="btn btn-success btn-sm" onclick="addMember('${c.clubId}')">Add to Club</button></div>
    <div class="col-md-2"><a href="#" class="btn btn-outline-secondary btn-sm" onclick="showView('users')">Create New User</a></div>
  </div></div></div>`;

  // Activities
  html+=`<div class="card"><div class="card-header">Recent Activities</div><div class="card-body">`;
  if(d.activities.length===0) html+=`<p class="text-muted">No activities yet.</p>`;
  else{
    html+=`<table class="table table-sm"><thead><tr><th>User</th><th>XP</th><th>Time</th></tr></thead><tbody>`;
    d.activities.forEach(a=>{html+=`<tr><td>${h(a.userNick)}</td><td>+${a.xpReward}</td><td>${a.recordedAt}</td></tr>`});
    html+=`</tbody></table>`;
  }
  html+=`</div></div>`;

  document.getElementById('v-club').innerHTML=html;
}

function toggleClubEdit(){
  const v=document.getElementById('club-view'),e=document.getElementById('club-edit');
  v.style.display=v.style.display==='none'?'':'none';
  e.style.display=e.style.display==='none'?'':'none';
}
async function saveClub(id){
  await post('/clubs/'+id,{name:document.getElementById('ce-name').value,level:+document.getElementById('ce-level').value,
    xp:+document.getElementById('ce-xp').value,maxMemberCount:+document.getElementById('ce-max').value,
    tag:document.getElementById('ce-tag').value,description:document.getElementById('ce-desc').value});
  loadClub(id);
}
async function incrLevel(id){await post('/clubs/'+id+'/level');loadClub(id)}
async function addXp(cid,uid){await post(`/clubs/${cid}/members/${uid}/xp`,{amount:20});loadClub(cid)}
async function moveMember(cid,uid,tid){await post(`/clubs/${cid}/members/${uid}/move`,{targetClubId:tid});loadClub(cid)}
async function removeMember(cid,uid){if(!confirm('Remove this member?'))return;await del(`/clubs/${cid}/members/${uid}`);loadClub(cid)}
async function addMember(cid){
  const uid=document.getElementById('add-member-sel').value;
  if(!uid)return;
  await post('/clubs/'+cid+'/members',{userId:uid});loadClub(cid);
}

// ── Users ──
async function load_users(){
  const users=await api('/users');
  let html=`<h3>Users</h3>
  <div class="card"><div class="card-header">Create New User</div><div class="card-body"><div class="row g-2 align-items-end">
    <div class="col-md-3"><label class="form-label">Nickname *</label><input class="form-control form-control-sm" id="nu-nick"/></div>
    <div class="col-md-3"><label class="form-label">User ID (auto)</label><input class="form-control form-control-sm" id="nu-id" placeholder="Leave empty"/></div>
    <div class="col-md-2"><label class="form-label">Country</label><input class="form-control form-control-sm" id="nu-cc" value="us"/></div>
    <div class="col-md-2"><div class="form-check mt-4"><input class="form-check-input" type="checkbox" id="nu-pro" checked/><label class="form-check-label" for="nu-pro">Pro</label></div></div>
    <div class="col-md-2"><button class="btn btn-success btn-sm" onclick="createUser()">Create</button></div>
  </div><div id="nu-msg"></div></div></div>`;

  html+=`<div class="card"><div class="card-header">All Users (${users.length})</div><div class="card-body">
  <table class="table table-sm table-striped"><thead><tr><th>Nick</th><th>ID</th><th>Country</th><th>Pro</th><th>Elo</th><th>Rating</th><th>Club</th><th></th></tr></thead><tbody>`;
  users.forEach(u=>{
    html+=`<tr id="ur-${u.id}"><td>${h(u.nick)}</td><td><code>${u.id}</code></td><td>${u.countryCode}</td><td>${u.isProUser?'Yes':'No'}</td>
    <td>${u.elo}</td><td>${u.rating}</td><td>${u.clubName?h(u.clubName):'<span class="text-muted">None</span>'}</td>
    <td><button class="btn btn-sm btn-outline-primary" onclick="editUser('${u.id}','${h(u.nick)}','${u.countryCode}',${u.isProUser},${u.elo},${u.rating})">Edit</button></td></tr>`;
  });
  html+=`</tbody></table></div></div>`;
  document.getElementById('v-users').innerHTML=html;
}

async function createUser(){
  const nick=document.getElementById('nu-nick').value.trim();
  if(!nick){alert('Nickname required');return}
  await post('/users',{nick,userId:document.getElementById('nu-id').value||null,countryCode:document.getElementById('nu-cc').value,isProUser:document.getElementById('nu-pro').checked});
  document.getElementById('nu-nick').value='';document.getElementById('nu-id').value='';
  load_users();
}

function editUser(id,nick,cc,pro,elo,rating){
  const row=document.getElementById('ur-'+id);
  if(!row)return;
  row.innerHTML=`<td><input class="form-control form-control-sm" id="eu-nick" value="${h(nick)}"/></td>
    <td><code>${id}</code></td>
    <td><input class="form-control form-control-sm" style="width:60px" id="eu-cc" value="${cc}"/></td>
    <td><input type="checkbox" class="form-check-input" id="eu-pro" ${pro?'checked':''}/></td>
    <td><input class="form-control form-control-sm" style="width:70px" type="number" id="eu-elo" value="${elo}"/></td>
    <td><input class="form-control form-control-sm" style="width:70px" type="number" id="eu-rat" value="${rating}"/></td>
    <td></td>
    <td><button class="btn btn-sm btn-success" onclick="saveUser('${id}')">Save</button> <button class="btn btn-sm btn-secondary" onclick="load_users()">Cancel</button></td>`;
}

async function saveUser(id){
  await post('/users/'+id,{nick:document.getElementById('eu-nick').value,countryCode:document.getElementById('eu-cc').value,
    isProUser:document.getElementById('eu-pro').checked,elo:+document.getElementById('eu-elo').value,rating:+document.getElementById('eu-rat').value});
  load_users();
}

// ── Challenges ──
async function load_challenges(){
  const chs=await api('/challenges');
  const users=await api('/users');
  let html=`<h3>Challenges</h3>
  <div class="card"><div class="card-header">Create Challenge</div><div class="card-body"><div class="row g-2 align-items-end">
    <div class="col-md-2"><label class="form-label">Map</label><input class="form-control form-control-sm" id="nc-map" value="world"/></div>
    <div class="col-md-2"><label class="form-label">Time (s)</label><input class="form-control form-control-sm" type="number" id="nc-time" value="60"/></div>
    <div class="col-md-2"><div class="form-check mt-4"><input class="form-check-input" type="checkbox" id="nc-nm"/><label class="form-check-label">No Move</label></div></div>
    <div class="col-md-2"><div class="form-check mt-4"><input class="form-check-input" type="checkbox" id="nc-nr"/><label class="form-check-label">No Rotate</label></div></div>
    <div class="col-md-2"><div class="form-check mt-4"><input class="form-check-input" type="checkbox" id="nc-nz"/><label class="form-check-label">No Zoom</label></div></div>
    <div class="col-md-2"><button class="btn btn-success btn-sm" onclick="createChallenge()">Create</button></div>
  </div></div></div>`;

  for(const ch of chs){
    html+=`<div class="card"><div class="card-header" style="cursor:pointer" onclick="toggleCh('${ch.token}')">
      <strong>${ch.token}</strong> <span class="text-muted ms-2">Map: ${h(ch.map)} | ${ch.timeLimit}s | ${ch.scoreCount} scores</span>
      <span class="float-end" id="chev-${ch.token}">&#9660;</span></div>
      <div class="card-body" id="ch-${ch.token}" style="display:none"><div id="ch-inner-${ch.token}"><em>Loading...</em></div></div></div>`;
  }
  if(chs.length===0)html+=`<div class="alert alert-info">No challenges yet.</div>`;
  document.getElementById('v-challenges').innerHTML=html;
  // Store users for score forms
  window._chUsers=users;
}

async function toggleCh(token){
  const el=document.getElementById('ch-'+token);
  if(el.style.display==='none'){
    el.style.display='';
    document.getElementById('chev-'+token).innerHTML='&#9650;';
    const scores=await api('/challenges/'+token+'/scores');
    const users=window._chUsers||[];
    let uOpts=users.map(u=>`<option value="${u.id}">${h(u.nick)}</option>`).join('');
    let inner=`<div class="row g-2 align-items-end mb-3">
      <div class="col-md-3"><label class="form-label">User</label><select class="form-select form-select-sm" id="as-user-${token}"><option value="">--</option>${uOpts}</select></div>
      <div class="col-md-2"><label class="form-label">Score</label><input class="form-control form-control-sm" type="number" id="as-score-${token}" value="25000"/></div>
      <div class="col-md-2"><label class="form-label">Distance (m)</label><input class="form-control form-control-sm" type="number" id="as-dist-${token}" value="100"/></div>
      <div class="col-md-2"><button class="btn btn-success btn-sm" onclick="addScore('${token}')">Add Score</button></div></div>`;
    if(scores.length){
      inner+=`<table class="table table-sm"><thead><tr><th>#</th><th>Player</th><th>Score</th><th>Distance</th></tr></thead><tbody>`;
      scores.sort((a,b)=>(+b.score)-(+a.score)).forEach((s,i)=>{
        inner+=`<tr><td>${i+1}</td><td>${h(s.nick)}</td><td>${s.score} pts</td><td>${s.distance} m</td></tr>`;
      });
      inner+=`</tbody></table>`;
    }else inner+=`<p class="text-muted">No scores.</p>`;
    document.getElementById('ch-inner-'+token).innerHTML=inner;
  }else{
    el.style.display='none';
    document.getElementById('chev-'+token).innerHTML='&#9660;';
  }
}

async function createChallenge(){
  await post('/challenges',{map:document.getElementById('nc-map').value,timeLimit:+document.getElementById('nc-time').value,
    forbidMoving:document.getElementById('nc-nm').checked,forbidRotating:document.getElementById('nc-nr').checked,forbidZooming:document.getElementById('nc-nz').checked});
  load_challenges();
}
async function addScore(token){
  const uid=document.getElementById('as-user-'+token).value;
  if(!uid){alert('Select a user');return}
  await post('/challenges/'+token+'/scores',{userId:uid,score:+document.getElementById('as-score-'+token).value,distance:+document.getElementById('as-dist-'+token).value});
  toggleCh(token);toggleCh(token);// refresh
}

// ── Jobs ──
async function load_jobs(){
  const jobs=await api('/jobs');
  let html=`<h3>Scheduled Jobs</h3><p class="text-muted">Trigger Quartz jobs manually.</p>
  <table class="table table-striped"><thead><tr><th>Job</th><th>Next Fire (UTC)</th><th>Last Fire (UTC)</th><th></th></tr></thead><tbody>`;
  jobs.forEach(j=>{
    html+=`<tr><td><strong>${h(j.name)}</strong></td><td>${j.nextFire||'--'}</td><td>${j.lastFire||'Never'}</td>
    <td><button class="btn btn-sm btn-primary" id="jb-${j.name}" onclick="triggerJob('${j.name}')">Trigger</button></td></tr>`;
  });
  html+=`</tbody></table>`;
  document.getElementById('v-jobs').innerHTML=html;
}

async function triggerJob(name){
  const btn=document.getElementById('jb-'+name);
  btn.disabled=true;btn.textContent='Running...';
  try{await post('/jobs/'+name+'/trigger');btn.textContent='Done';btn.classList.replace('btn-primary','btn-success')}
  catch(e){btn.textContent='Failed';btn.classList.replace('btn-primary','btn-danger')}
  setTimeout(()=>{btn.disabled=false;btn.textContent='Trigger';btn.className='btn btn-sm btn-primary'},2000);
}

// Init
showView('dashboard');
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
