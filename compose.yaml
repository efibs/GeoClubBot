services:
  geoclubbot:
    image: geoclubbot
    build:
      context: .
      dockerfile: GeoClubBot.API/Dockerfile
    depends_on:
      postgresqldb:
        condition: service_healthy
  postgresqldb:
    image: postgres:17.5
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgresqldb-password
      POSTGRES_USER_FILE: /run/secrets/postgresqldb-username
      POSTGRES_DB: geoclubbot
    volumes:
      - type: volume
        source: postgresqldb-data
        target: /var/lib/postgresql/data
      - ./postgresql-healthcheck.sh:/postgresql-healthcheck.sh:ro
    secrets:
      - postgresqldb-username
      - postgresqldb-password
    healthcheck:
      test: [ "CMD", "/postgresql-healthcheck.sh" ]
      interval: 5s
      timeout: 5s
      retries: 5
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - ./qdrant_storage:/qdrant/storage
    ulimits:
      nofile:
        soft: 10000
        hard: 10000
  # OpenTelemetry backend for local dev: a turnkey traces + metrics + logs UI that receives
  # OTLP. Start with `docker compose up aspire-dashboard`, then open http://localhost:18888.
  # The app exports to it via OpenTelemetry:Endpoint = http://localhost:4317 (see appsettings.Development.json).
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "18888:18888"  # Dashboard UI
      - "4317:18889"   # OTLP/gRPC receiver the app exports to
secrets:
  postgresqldb-username:
    file: .env.postgresqldb-username
  postgresqldb-password:
    file: .env.postgresqldb-password
volumes:
  postgresqldb-data: